# To build it yourself, always use clang over gcc or msvc, and ideally LLVM project's clang over other variants of clang. It's plain faster.
# Run `Build/linux/build.sh --native --static --release --enable-lto --enable-pgo` to build a decent binary.
# For more optimised builds, check how we do it below. Everything here is not selected on a whim but tested to indeed produce a faster binary.
# Thanks to studies and contributions from afed, Emre, Ironclad, Itachi Uchiha, Miss Ashenlight, Soda, SwareJonge, Trix, Yiss and other people in the community for discovering the method to build the fastest binary.

name: pgo-build
# on:
#   schedule:
#   - cron: "8 8 * * FRI"
on: push # testing only

jobs:
  tag:
    runs-on: "ubuntu-latest"
    outputs:
      tag: ${{ steps.generate-tag.outputs.tag }}
      name: ${{ steps.generate-name.outputs.name }}
      sha: ${{ steps.generate-name.outputs.sha }}
    steps:
    - run: git clone --depth 1 https://gitlab.com/AOMediaCodec/SVT-AV1.git .
    - id: generate-tag
      run: echo tag=pgo-build-$(git log -1 "--date=format:%F" "--format=%ad-%h") >> "$GITHUB_OUTPUT"
    - id: generate-name
      run: echo name=$(git log -1 "--date=format:%F" "--format=%ad %h") >> "$GITHUB_OUTPUT"
    - id: generate-sha
      run: echo sha=$(git log -1 "--format=%H") >> "$GITHUB_OUTPUT"


  release:
    needs: tag
    runs-on: "ubuntu-latest"
    outputs:
      release: ${{ steps.check-tag.outputs == 'failure' }}
    steps:
    - id: check-tag
      run: git ls-remote --exit-code origin --tags ${{ needs.tag.outputs.tag }}
      continue-on-error: true
    - run: git config user.email Akatsumekusa@protonmail.com && git config user.name "Akatsumekusa"
      if: ${{ steps.check-tag.outcome == 'failure' }}
    - run: git commit --allow-empty -m ${{ needs.tag.outputs.tag }} && git push origin pgo-build-tags
      if: ${{ steps.check-tag.outcome == 'failure' }}
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        target_commitish: pgo-build-tags
        name: Mainline SVT-AV1 ${{ needs.tag.outputs.name }}
        body: |
          Commit `${{ needs.tag.outputs.sha }}`  
          Windows | x86-64 | LLVM Project Clang LLD | winthread | `icelake-server` + `znver5` | LTO PGO  
          Windows | x86-64 | LLVM Project Clang LLD | winthread | `znver2` | LTO PGO  
          Windows | x86-64 | LLVM Project Clang LLD | winthread | `x86-64-v3` | LTO PGO  
          Windows | arm64 | LLVM Project Clang LLD | winthread | `armv8.7-a+crypto+sm4+sha3+fp16+sve+sve2` + `oryon-1` | LTO PGO  
          Linux | x86-64 | LLVM Project Clang LLD | `icelake-server` + `znver5` | LTO PGO  
          Linux | x86-64 | LLVM Project Clang LLD | `znver2` | LTO PGO  
          Linux | x86-64 | LLVM Project Clang LLD | `x86-64-v3` | LTO PGO  
          macOS | arm64 | LLVM Project Clang LLD | `armv8.5-a+simd+crypto` + `apple-m3` | LTO PGO  
          macOS | x86-64 | LLVM Project Clang LLD | `skylake` | LTO PGO  

          On x86-64 systems, no matter if you're on an Intel or AMD system, you should try these builds in the order of `icelake-server` + `znver5` ⇒ `znver2` ⇒ `x86-64-v3`.  
          If your CPU doesn't support the features required by the `icelake-server` + `znver5` version, often indicated by crashing outright when attempting to make any encodes, you can try the `znver2` version and see if that works. If not, then the `x86-64-v3` version, which should always work on any modern systems.  
          Some versions might not be available if the GitHub Actions runners we get this time don't support the respective features.  

          We provide the binaries here for people that need it, but we do NOT recommend using mainline SVT-AV1 for encodes because mainline has been focused solely on ancient metrics like PSNR and SSIM while completely disregarding visual quality.  
          Check the [README](../../../#svt-av1-builds) for our recommendations instead.  

          Thanks to studies and contributions from afed, Emre, Ironclad, Itachi Uchiha, Miss Ashenlight, Soda, SwareJonge, Trix, Yiss and other people in the community for discovering the method to build the fastest binary.  
        prerelease: true
        make_latest: "false"
      if: ${{ steps.check-tag.outcome == 'failure' }}


  # `clang-cl` is broken when running in GitHub Actions and either the profiling run fails, or the final binary doesn't work. Using `clang` and `clang++` for now.
  # TODO: Test and migrate to MCF Gthread.
  build-windows-x86-64:
    needs: [tag, release]
    if: ${{ needs.release.outputs.release == true }}
    runs-on: "windows-latest"
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        path-type: inherit
        install: >-
          mingw-w64-ucrt-x86_64-fastfetch
    - run: fastfetch
    - run: git clone --depth 250 https://gitlab.com/AOMediaCodec/SVT-AV1.git .
    - uses: actions/checkout@v7
      with:
        path: SolLevante
        ref: sollevante
    - run: xz --decompress SolLevante/SolLevante.y4m.xz
    - uses: ilammy/setup-nasm@v1
    - uses: ZhongRuoyu/setup-llvm@v0
    - uses: lukka/get-cmake@latest
    - run: cmake --fresh -B svt_build -G Ninja -DCMAKE_C_COMPILER="clang" -DCMAKE_CXX_COMPILER="clang++" -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DBUILD_APPS=ON -DTHREADS_PREFER_PTHREAD_FLAG=OFF -DCMAKE_USE_WIN32_THREADS_INIT=ON -DSVT_AV1_LTO=OFF -DENABLE_AVX512=ON -DCMAKE_C_FLAGS_RELEASE="-O3 -flto=full -march=icelake-server -mtune=znver5 -mprefer-vector-width=512 -fno-exceptions -fno-rtti -DNDEBUG -Wno-unused-command-line-argument -Wno-deprecated -fprofile-generate=SolLevante -ftemporal-profile" -DCMAKE_CXX_FLAGS_RELEASE="-O3 -flto=full -march=icelake-server -mtune=znver5 -mprefer-vector-width=512 -fno-exceptions -fno-rtti -DNDEBUG -Wno-unused-command-line-argument -Wno-deprecated -fprofile-generate=SolLevante -ftemporal-profile" -DCMAKE_EXE_LINKER_FLAGS_RELEASE="-fuse-ld=lld -flto=full" && ninja -v -C svt_build
    - id: profile-avx512
      run: Bin/Release/SvtAv1EncApp.exe -i SolLevante/SolLevante.y4m -b /dev/null --preset 2 --crf 20.00 --lineart-psy-bias 5 --texture-psy-bias 5
      continue-on-error: true
    - run: llvm-profdata merge -o SolLevante/default.profdata SolLevante/*.profraw
      if: ${{ steps.profile-avx512.outcome != 'failure' }}
    - run: ls SolLevante
      if: ${{ steps.profile-avx512.outcome != 'failure' }}
    - run: cmake --fresh -B svt_build -G Ninja -DCMAKE_C_COMPILER="clang" -DCMAKE_CXX_COMPILER="clang++" -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DBUILD_APPS=ON -DTHREADS_PREFER_PTHREAD_FLAG=OFF -DCMAKE_USE_WIN32_THREADS_INIT=ON -DSVT_AV1_LTO=OFF -DENABLE_AVX512=ON -DCMAKE_C_FLAGS_RELEASE="-O3 -flto=full -fwhole-program-vtables -fvisibility=hidden -fvisibility-inlines-hidden -march=icelake-server -mtune=znver5 -mprefer-vector-width=512 -fno-exceptions -fno-rtti -DNDEBUG -Wno-unused-command-line-argument -Wno-deprecated -fprofile-use=\"$(cygpath -m $(realpath SolLevante/default.profdata))\"" -DCMAKE_CXX_FLAGS_RELEASE="-O3 -flto=full -fwhole-program-vtables -fvisibility=hidden -fvisibility-inlines-hidden -march=icelake-server -mtune=znver5 -mprefer-vector-width=512 -fno-exceptions -fno-rtti -DNDEBUG -Wno-unused-command-line-argument -Wno-deprecated -fprofile-use=\"$(cygpath -m $(realpath SolLevante/default.profdata))\"" -DCMAKE_EXE_LINKER_FLAGS_RELEASE="-fuse-ld=lld -flto=full -fwhole-program-vtables -fvisibility=hidden -fvisibility-inlines-hidden" && ninja -v -C svt_build
      if: ${{ steps.profile-avx512.outcome != 'failure' }}
    - run: Bin/Release/SvtAv1EncApp.exe -i SolLevante/SolLevante.y4m -b /dev/null --preset 4 --crf 20.00 --lineart-psy-bias 5 --texture-psy-bias 5
      if: ${{ steps.profile-avx512.outcome != 'failure' }}
    - run: cd Bin/Release && tar cJf Windows_x86-64_icelake-server+znver5.tar.xz SvtAv1EncApp.exe && cd ../..
      if: ${{ steps.profile-avx512.outcome != 'failure' }}
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: Bin/Release/Windows_x86-64_icelake-server+znver5.tar.xz
      if: ${{ steps.profile-avx512.outcome != 'failure' }}
    - run: rm -rf svt_build SolLevante/*.profraw SolLevante/*.profdata
    - run: ls SolLevante
    - run: cmake --fresh -B svt_build -G Ninja -DCMAKE_C_COMPILER="clang" -DCMAKE_CXX_COMPILER="clang++" -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DBUILD_APPS=ON -DTHREADS_PREFER_PTHREAD_FLAG=OFF -DCMAKE_USE_WIN32_THREADS_INIT=ON -DSVT_AV1_LTO=OFF -DENABLE_AVX512=ON -DCMAKE_C_FLAGS_RELEASE="-O3 -flto=full -march=znver2 -mtune=znver2 -mprefer-vector-width=512 -fno-exceptions -fno-rtti -DNDEBUG -Wno-unused-command-line-argument -Wno-deprecated -fprofile-generate=SolLevante -ftemporal-profile" -DCMAKE_CXX_FLAGS_RELEASE="-O3 -flto=full -march=znver2 -mtune=znver2 -mprefer-vector-width=512 -fno-exceptions -fno-rtti -DNDEBUG -Wno-unused-command-line-argument -Wno-deprecated -fprofile-generate=SolLevante -ftemporal-profile" -DCMAKE_EXE_LINKER_FLAGS_RELEASE="-fuse-ld=lld -flto=full" && ninja -v -C svt_build
    - id: profile-znver2
      run: Bin/Release/SvtAv1EncApp.exe -i SolLevante/SolLevante.y4m -b /dev/null --preset 2 --crf 20.00 --lineart-psy-bias 5 --texture-psy-bias 5
      continue-on-error: true
    - run: llvm-profdata merge -o SolLevante/default.profdata SolLevante/*.profraw
      if: ${{ steps.profile-znver2.outcome != 'failure' }}
    - run: ls SolLevante
      if: ${{ steps.profile-znver2.outcome != 'failure' }}
    - run: cmake --fresh -B svt_build -G Ninja -DCMAKE_C_COMPILER="clang" -DCMAKE_CXX_COMPILER="clang++" -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DBUILD_APPS=ON -DTHREADS_PREFER_PTHREAD_FLAG=OFF -DCMAKE_USE_WIN32_THREADS_INIT=ON -DSVT_AV1_LTO=OFF -DENABLE_AVX512=ON -DCMAKE_C_FLAGS_RELEASE="-O3 -flto=full -fwhole-program-vtables -fvisibility=hidden -fvisibility-inlines-hidden -march=znver2 -mtune=znver2 -mprefer-vector-width=512 -fno-exceptions -fno-rtti -DNDEBUG -Wno-unused-command-line-argument -Wno-deprecated -fprofile-use=\"$(cygpath -m $(realpath SolLevante/default.profdata))\"" -DCMAKE_CXX_FLAGS_RELEASE="-O3 -flto=full -fwhole-program-vtables -fvisibility=hidden -fvisibility-inlines-hidden -march=znver2 -mtune=znver2 -mprefer-vector-width=512 -fno-exceptions -fno-rtti -DNDEBUG -Wno-unused-command-line-argument -Wno-deprecated -fprofile-use=\"$(cygpath -m $(realpath SolLevante/default.profdata))\"" -DCMAKE_EXE_LINKER_FLAGS_RELEASE="-fuse-ld=lld -flto=full -fwhole-program-vtables -fvisibility=hidden -fvisibility-inlines-hidden" && ninja -v -C svt_build
      if: ${{ steps.profile-znver2.outcome != 'failure' }}
    - run: Bin/Release/SvtAv1EncApp.exe -i SolLevante/SolLevante.y4m -b /dev/null --preset 4 --crf 20.00 --lineart-psy-bias 5 --texture-psy-bias 5
      if: ${{ steps.profile-znver2.outcome != 'failure' }}
    - run: cd Bin/Release && tar cJf Windows_x86-64_znver2.tar.xz SvtAv1EncApp.exe && cd ../..
      if: ${{ steps.profile-znver2.outcome != 'failure' }}
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: Bin/Release/Windows_x86-64_znver2.tar.xz
      if: ${{ steps.profile-znver2.outcome != 'failure' }}
    - run: rm -rf svt_build SolLevante/*.profraw SolLevante/*.profdata
    - run: ls SolLevante
    - run: cmake --fresh -B svt_build -G Ninja -DCMAKE_C_COMPILER="clang" -DCMAKE_CXX_COMPILER="clang++" -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DBUILD_APPS=ON -DTHREADS_PREFER_PTHREAD_FLAG=OFF -DCMAKE_USE_WIN32_THREADS_INIT=ON -DSVT_AV1_LTO=OFF -DENABLE_AVX512=ON -DCMAKE_C_FLAGS_RELEASE="-O3 -flto=full -march=x86-64-v3 -mtune=x86-64 -mno-gather -fno-exceptions -fno-rtti -DNDEBUG -Wno-unused-command-line-argument -Wno-deprecated -fprofile-generate=SolLevante -ftemporal-profile" -DCMAKE_CXX_FLAGS_RELEASE="-O3 -flto=full -march=x86-64-v3 -mtune=x86-64 -mno-gather -fno-exceptions -fno-rtti -DNDEBUG -Wno-unused-command-line-argument -Wno-deprecated -fprofile-generate=SolLevante -ftemporal-profile" -DCMAKE_EXE_LINKER_FLAGS_RELEASE="-fuse-ld=lld -flto=full" && ninja -v -C svt_build
    - run: Bin/Release/SvtAv1EncApp.exe -i SolLevante/SolLevante.y4m -b /dev/null --preset 2 --crf 20.00 --lineart-psy-bias 5 --texture-psy-bias 5
    - run: llvm-profdata merge -o SolLevante/default.profdata SolLevante/*.profraw
    - run: ls SolLevante
    - run: cmake --fresh -B svt_build -G Ninja -DCMAKE_C_COMPILER="clang" -DCMAKE_CXX_COMPILER="clang++" -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DBUILD_APPS=ON -DTHREADS_PREFER_PTHREAD_FLAG=OFF -DCMAKE_USE_WIN32_THREADS_INIT=ON -DSVT_AV1_LTO=OFF -DENABLE_AVX512=ON -DCMAKE_C_FLAGS_RELEASE="-O3 -flto=full -fwhole-program-vtables -fvisibility=hidden -fvisibility-inlines-hidden -march=x86-64-v3 -mtune=x86-64 -mno-gather -fno-exceptions -fno-rtti -DNDEBUG -Wno-unused-command-line-argument -Wno-deprecated -fprofile-use=\"$(cygpath -m $(realpath SolLevante/default.profdata))\"" -DCMAKE_CXX_FLAGS_RELEASE="-O3 -flto=full -fwhole-program-vtables -fvisibility=hidden -fvisibility-inlines-hidden -march=x86-64-v3 -mtune=x86-64 -mno-gather -fno-exceptions -fno-rtti -DNDEBUG -Wno-unused-command-line-argument -Wno-deprecated -fprofile-use=\"$(cygpath -m $(realpath SolLevante/default.profdata))\"" -DCMAKE_EXE_LINKER_FLAGS_RELEASE="-fuse-ld=lld -flto=full -fwhole-program-vtables -fvisibility=hidden -fvisibility-inlines-hidden" && ninja -v -C svt_build
    - run: Bin/Release/SvtAv1EncApp.exe -i SolLevante/SolLevante.y4m -b /dev/null --preset 4 --crf 20.00 --lineart-psy-bias 5 --texture-psy-bias 5
    - run: cd Bin/Release && tar cJf Windows_x86-64_x86-64-v3.tar.xz SvtAv1EncApp.exe && cd ../..
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: Bin/Release/Windows_x86-64_x86-64-v3.tar.xz


  build-windows-arm64:
    needs: [tag, release]
    if: ${{ needs.release.outputs.release == true }}
    runs-on: "windows-11-arm"
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - uses: msys2/setup-msys2@v2
      with:
        msystem: CLANGARM64
        path-type: inherit
        install: >-
          mingw-w64-clang-aarch64-fastfetch
    - run: fastfetch
    - run: git clone --depth 250 https://gitlab.com/AOMediaCodec/SVT-AV1.git .
    - uses: actions/checkout@v7
      with:
        path: SolLevante
        ref: sollevante
    - run: xz --decompress SolLevante/SolLevante.y4m.xz
    - id: install-llvm-30
      uses: KyleMayes/install-llvm-action@v2
      with:
        version: "30"
      continue-on-error: true
    - id: install-llvm-29
      uses: KyleMayes/install-llvm-action@v2
      if: ${{ steps.install-llvm-30.outcome == 'failure' }}
      with:
        version: "29"
      continue-on-error: true
    - id: install-llvm-28
      uses: KyleMayes/install-llvm-action@v2
      if: ${{ steps.install-llvm-29.outcome == 'failure' }}
      with:
        version: "28"
      continue-on-error: true
    - id: install-llvm-27
      uses: KyleMayes/install-llvm-action@v2
      if: ${{ steps.install-llvm-28.outcome == 'failure' }}
      with:
        version: "27"
      continue-on-error: true
    - id: install-llvm-26
      uses: KyleMayes/install-llvm-action@v2
      if: ${{ steps.install-llvm-27.outcome == 'failure' }}
      with:
        version: "26"
      continue-on-error: true
    - id: install-llvm-25
      uses: KyleMayes/install-llvm-action@v2
      if: ${{ steps.install-llvm-26.outcome == 'failure' }}
      with:
        version: "25"
      continue-on-error: true
    - id: install-llvm-24
      uses: KyleMayes/install-llvm-action@v2
      if: ${{ steps.install-llvm-25.outcome == 'failure' }}
      with:
        version: "24"
      continue-on-error: true
    - id: install-llvm-23
      uses: KyleMayes/install-llvm-action@v2
      if: ${{ steps.install-llvm-24.outcome == 'failure' }}
      with:
        version: "23"
      continue-on-error: true
    - id: install-llvm-22
      uses: KyleMayes/install-llvm-action@v2
      if: ${{ steps.install-llvm-23.outcome == 'failure' }}
      with:
        version: "22"
      continue-on-error: true
    - id: install-llvm-21
      uses: KyleMayes/install-llvm-action@v2
      if: ${{ steps.install-llvm-22.outcome == 'failure' }}
      with:
        version: "21"
      continue-on-error: true
    - uses: KyleMayes/install-llvm-action@v2
      if: ${{ steps.install-llvm-21.outcome == 'failure' }}
      with:
        version: "20"
    - uses: lukka/get-cmake@latest
    - run: cmake --fresh -B svt_build -G Ninja -DCMAKE_C_COMPILER="clang" -DCMAKE_CXX_COMPILER="clang++" -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DBUILD_APPS=ON -DTHREADS_PREFER_PTHREAD_FLAG=OFF -DCMAKE_USE_WIN32_THREADS_INIT=ON -DSVT_AV1_LTO=OFF -DCMAKE_C_FLAGS_RELEASE="-O3 -flto=full -march=armv8.7-a+crypto+sm4+sha3+fp16+sve+sve2 -mtune=oryon-1 -fno-exceptions -fno-rtti -DNDEBUG -Wno-unused-command-line-argument -Wno-deprecated -fprofile-generate=SolLevante -ftemporal-profile" -DCMAKE_CXX_FLAGS_RELEASE="-O3 -flto=full -march=armv8.7-a+crypto+sm4+sha3+fp16+sve+sve2 -mtune=oryon-1 -fno-exceptions -fno-rtti -DNDEBUG -Wno-unused-command-line-argument -Wno-deprecated -fprofile-generate=SolLevante -ftemporal-profile" -DCMAKE_EXE_LINKER_FLAGS_RELEASE="-fuse-ld=lld -flto=full" && ninja -v -C svt_build
    - run: Bin/Release/SvtAv1EncApp.exe -i SolLevante/SolLevante.y4m -b /dev/null --preset 2 --crf 20.00 --lineart-psy-bias 5 --texture-psy-bias 5
    - run: llvm-profdata merge -o SolLevante/default.profdata SolLevante/*.profraw
    - run: ls SolLevante
    - run: cmake --fresh -B svt_build -G Ninja -DCMAKE_C_COMPILER="clang" -DCMAKE_CXX_COMPILER="clang++" -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DBUILD_APPS=ON -DTHREADS_PREFER_PTHREAD_FLAG=OFF -DCMAKE_USE_WIN32_THREADS_INIT=ON -DSVT_AV1_LTO=OFF -DCMAKE_C_FLAGS_RELEASE="-O3 -flto=full -fwhole-program-vtables -fvisibility=hidden -fvisibility-inlines-hidden -march=armv8.7-a+crypto+sm4+sha3+fp16+sve+sve2 -mtune=oryon-1 -fno-exceptions -fno-rtti -DNDEBUG -Wno-unused-command-line-argument -Wno-deprecated -fprofile-use=\"$(cygpath -m $(realpath SolLevante/default.profdata))\"" -DCMAKE_CXX_FLAGS_RELEASE="-O3 -flto=full -fwhole-program-vtables -fvisibility=hidden -fvisibility-inlines-hidden -march=armv8.7-a+crypto+sm4+sha3+fp16+sve+sve2 -mtune=oryon-1 -fno-exceptions -fno-rtti -DNDEBUG -Wno-unused-command-line-argument -Wno-deprecated -fprofile-use=\"$(cygpath -m $(realpath SolLevante/default.profdata))\"" -DCMAKE_EXE_LINKER_FLAGS_RELEASE="-fuse-ld=lld -flto=full -fwhole-program-vtables -fvisibility=hidden -fvisibility-inlines-hidden" && ninja -v -C svt_build
    - run: Bin/Release/SvtAv1EncApp.exe -i SolLevante/SolLevante.y4m -b /dev/null --preset 4 --crf 20.00 --lineart-psy-bias 5 --texture-psy-bias 5
    - run: cd Bin/Release && tar cJf Windows_arm64_armv8.7-a+crypto+sm4+sha3+fp16+sve+sve2+oryon-1.tar.xz SvtAv1EncApp.exe && cd ../..
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: Bin/Release/Windows_arm64_armv8.7-a+crypto+sm4+sha3+fp16+sve+sve2+oryon-1.tar.xz


  # BOLT is currently having problems with fully static binaries, and making the binaries static outweigh the benefit of BOLT.
  # In the future if BOLT can actually be used, this is the way you can perform BOLT on your own build.
  # 1. Add `-Wl,--emit-relocs,-znow` to `LDFLAGS`.
  # 2. Add these commands after `build.sh` PGO build:
  # ```sh
  # perf record -e cycles:u -j any,u -o SolLevante/perf.data -- Bin/Release/SvtAv1EncApp -i SolLevante/SolLevante.y4m -b /dev/null --preset 2 --crf 20.00 --lineart-psy-bias 5 --texture-psy-bias 5
  # perf2bolt -p SolLevante/perf.data -o SolLevante/perf.fdata Bin/Release/SvtAv1EncApp
  # llvm-bolt Bin/Release/SvtAv1EncApp -o Bin/Release/SvtAv1EncApp.bolt -data=SolLevante/perf.fdata --relocs --remove-symtab --eliminate-unreachable --hugify --align-blocks --reorder-blocks=ext-tsp --reorder-functions-use-hot-size --use-edge-counts --min-branch-clusters --split-functions --split-strategy=profile2 --split-eh --split-all-cold --frame-opt=all --frame-opt-rm-stores --reg-reassign --use-aggr-reg-reassign --inline-memcpy --inline-ap --shorten-instructions --infer-fall-throughs --infer-stale-profile --equalize-bb-counts --iterative-guess --indirect-call-promotion=all --indirect-call-promotion-use-mispredicts --icp-eliminate-loads --jump-tables=aggressive --simplify-rodata-loads --plt=all --icf=1 --peepholes=all --eliminate-unreachable --elim-link-veneers --group-stubs --fix-block-counts --fix-func-counts --match-profile-with-function-hash --match-with-call-graph --use-compact-aligner --preserve-blocks-alignment --x86-align-branch-boundary-hot-only --x86-strip-redundant-address-size --tail-duplication=cache --simplify-conditional-tail-calls --sctc-mode=heuristic --dyno-stats --icp-mp-threshold=1
  # ```
  build-linux-x86-64:
    needs: [tag, release]
    if: ${{ needs.release.outputs.release == true }}
    runs-on: "ubuntu-latest"
    steps:
    - uses: ConorMacBride/install-package@v1
      with:
        apt: neofetch
    - run: neofetch
    - run: git clone --depth 250 https://gitlab.com/AOMediaCodec/SVT-AV1.git .
    - uses: actions/checkout@v7
      with:
        path: SolLevante
        ref: sollevante
    - run: xz --decompress SolLevante/SolLevante.y4m.xz
    - uses: ilammy/setup-nasm@v1
    - uses: ZhongRuoyu/setup-llvm@v0
    - id: build-avx512
      run: CFLAGS="-flto=full -march=icelake-server -mtune=znver5 -fno-exceptions -fno-rtti -DNDEBUG" CPPFLAGS="-flto=full -march=icelake-server -mtune=znver5 -fno-exceptions -fno-rtti -DNDEBUG" LDFLAGS="-fuse-ld=lld -flto=full" Build/linux/build.sh --verbose --static --release --disable-native --enable-avx512 --disable-lto --enable-pgo --pgo-videos="$(realpath SolLevante)"
      continue-on-error: true
    - run: Bin/Release/SvtAv1EncApp -i SolLevante/SolLevante.y4m -b /dev/null --preset 4 --crf 20.00 --lineart-psy-bias 5 --texture-psy-bias 5
      if: ${{ steps.build-avx512.outcome != 'failure' }}
    - run: cd Bin/Release && tar cJf Linux_x86-64_icelake-server+znver5.tar.xz SvtAv1EncApp && cd ../..
      if: ${{ steps.build-avx512.outcome != 'failure' }}
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: Bin/Release/Linux_x86-64_icelake-server+znver5.tar.xz
      if: ${{ steps.build-avx512.outcome != 'failure' }}
    - run: Build/linux/build.sh --clean
    - id: build-znver2
      run: CFLAGS="-flto=full -march=znver2 -mtune=znver2 -fno-exceptions -fno-rtti -DNDEBUG" CPPFLAGS="-flto=full -march=znver2 -mtune=znver2 -fno-exceptions -fno-rtti -DNDEBUG" LDFLAGS="-fuse-ld=lld -flto=full" Build/linux/build.sh --verbose --static --release --disable-native --enable-avx512 --disable-lto --enable-pgo --pgo-videos="$(realpath SolLevante)"
      continue-on-error: true
    - run: Bin/Release/SvtAv1EncApp -i SolLevante/SolLevante.y4m -b /dev/null --preset 4 --crf 20.00 --lineart-psy-bias 5 --texture-psy-bias 5
      if: ${{ steps.build-znver2.outcome != 'failure' }}
    - run: cd Bin/Release && tar cJf Linux_x86-64_znver2.tar.xz SvtAv1EncApp && cd ../..
      if: ${{ steps.build-znver2.outcome != 'failure' }}
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: Bin/Release/Linux_x86-64_znver2.tar.xz
      if: ${{ steps.build-znver2.outcome != 'failure' }}
    - run: Build/linux/build.sh --clean
    - run: CFLAGS="-flto=full -march=x86-64-v3 -mtune=x86-64 -mno-gather -fno-exceptions -fno-rtti -DNDEBUG" CPPFLAGS="-flto=full -march=x86-64-v3 -mtune=x86-64 -mno-gather -fno-exceptions -fno-rtti -DNDEBUG" LDFLAGS="-fuse-ld=lld -flto=full" Build/linux/build.sh --verbose --static --release --disable-native --enable-avx512 --disable-lto --enable-pgo --pgo-videos="$(realpath SolLevante)"
    - run: Bin/Release/SvtAv1EncApp -i SolLevante/SolLevante.y4m -b test.ivf --preset 4 --crf 20.00 --lineart-psy-bias 5 --texture-psy-bias 5
    - run: cd Bin/Release && tar cJf Linux_x86-64_x86-64-v3.tar.xz SvtAv1EncApp && cd ../..
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: Bin/Release/Linux_x86-64_x86-64-v3.tar.xz


  # For some reason `-flto=full` is broken and fails the linking, so using `-DSVT_AV1_LTO=ON` for now.  
